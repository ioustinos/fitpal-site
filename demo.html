/* ── REQUEST CHANGE FORM ── */
const CHANGE_OPTIONS = [
  { id:'address',  label:{el:'Αλλαγή διεύθυνσης ή ώρας παράδοσης',en:'Change delivery address or time'} },
  { id:'variant',  label:{el:'Αφαίρεση ή αλλαγή παραλλαγής πιάτου',en:'Remove or change dish variant'} },
  { id:'add',      label:{el:'Προσθήκη πιάτων',en:'Add dishes'} },
  { id:'addday',   label:{el:'Προσθήκη ημέρας',en:'Add day'} },
  { id:'removeday',label:{el:'Αφαίρεση ημέρας',en:'Remove day'} },
  { id:'general',  label:{el:'Γενικά σχόλια ή τρόπος πληρωμής',en:'General comments or payment method'} },
];

function toggleChangeForm(oi) {
  const container = document.getElementById(`change-form-${oi}`);
  if(container.style.display !== 'none') { container.style.display='none'; return; }
  const options = CHANGE_OPTIONS.map(opt =>
    `<label class="change-option" onclick="this.querySelector('input').checked=true">
      <input type="radio" name="change-type-${oi}" value="${opt.id}">
      <span>${opt.label[lang]}</span>
    </label>`
  ).join('');
  container.innerHTML = `<div class="change-form">
    <div class="change-form-title">${lang==='el'?'Τι θα ήθελες να αλλάξεις;':'What would you like to change?'}</div>
    ${options}
    <div class="fwrap" style="margin-top:4px">
      <label class="flabel">${lang==='el'?'Περιγραφή αλλαγής':'Describe the change'}</label>
      <textarea class="change-textarea" id="change-msg-${oi}" placeholder="${lang==='el'?'Περίγραψε τι αλλαγή θα ήθελες...':'Describe what you would like to change...'}"></textarea>
    </div>
    <button class="btn-submit-change" onclick="submitChangeRequest(${oi})">${lang==='el'?'Υποβολή αιτήματος':'Submit request'}</button>
  </div>`;
  container.style.display='block';
}

function submitChangeRequest(oi) {
  const sel = document.querySelector(`input[name="change-type-${oi}"]:checked`);
  const msg = document.getElementById(`change-msg-${oi}`)?.value.trim();
  if(!sel) { showToast(lang==='el'?'Επίλεξε τύπο αλλαγής':'Select a change type'); return; }
  if(!msg) { showToast(lang==='el'?'Περίγραψε την αλλαγή':'Describe the change'); return; }
  showToast(lang==='el'?'Το αίτημα αλλαγής υποβλήθηκε!':'Change request submitted!');
  document.getElementById(`change-form-${oi}`).style.display='none';
}

function deleteAddr(id) {
  if(!currentUser) return;
  currentUser.addresses=currentUser.addresses.filter(a=>a.id!==id);
  editingAddrId=null;
  renderAccountContent();
}
function startEditAddr(id) {
  editingAddrId=id;
  renderAccountContent();
}
function cancelEditAddr() {
  editingAddrId=null;
  renderAccountContent();
}
function saveEditAddr(id) {
  if(!currentUser) return;
  const a=currentUser.addresses.find(x=>x.id===id);
  if(!a) return;
  const pre = `ea-${id}`;
  const label=document.getElementById(`ea-label-${id}`)?.value.trim();
  const street=document.getElementById(`${pre}-street`)?.value.trim();
  const pc=document.getElementById(`${pre}-postcode`)?.value.trim();
  const city=document.getElementById(`${pre}-city`)?.value.trim();
  const floor=document.getElementById(`${pre}-floor`)?.value.trim();
  const doorbell=document.getElementById(`${pre}-doorbell`)?.value.trim();
  const comments=document.getElementById(`${pre}-comments`)?.value.trim();
  if(!street||!city){ showToast(lang==='el'?'Οδός και Πόλη υποχρεωτικά.':'Street and City required.'); return; }
  a.label={el:label||a.label.el, en:label||a.label.en};
  a.street=street;
  a.postcode=pc||'';
  a.city=city;
  a.floor=floor||'';
  a.doorbell=doorbell||'';
  a.comments=comments?{el:comments,en:comments}:null;
  editingAddrId=null;
  showToast(lang==='el'?'Αποθηκεύτηκε!':'Saved!');
  renderAccountContent();
}
function saveNewAddr() {
  const label=document.getElementById('na-label')?.value.trim();
  const street=document.getElementById('na-street')?.value.trim();
  const pc=document.getElementById('na-postcode')?.value.trim();
  const city=document.getElementById('na-city')?.value.trim();
  const floor=document.getElementById('na-floor')?.value.trim();
  const doorbell=document.getElementById('na-doorbell')?.value.trim();
  const comments=document.getElementById('na-comments')?.value.trim();
  if(!street||!city){ showToast(lang==='el'?'Οδός και Πόλη υποχρεωτικά.':'Street and City required.'); return; }
  currentUser.addresses.push({
    id:'a'+Date.now(),
    label:{el:label||'Διεύθυνση',en:label||'Address'},
    street, postcode:pc||'', city,
    floor:floor||'', doorbell:doorbell||'',
    comments: comments ? {el:comments,en:comments} : null
  });
  showToast(lang==='el'?'Αποθηκεύτηκε!':'Saved!');
  renderAccountContent();
}
function saveProfile() {
  if(!currentUser) return;
  const name=document.getElementById('prof-name')?.value.trim();
  const phone=document.getElementById('prof-phone')?.value.trim();
  if(name){ currentUser.name=name; currentUser.nameEn=name; }
  if(phone) currentUser.phone=phone;
  renderHeader();
  showToast(lang==='el'?'Αποθηκεύτηκε!':'Saved!');
}

/* ── GOALS TAB ── */
function renderGoalsTab(el, u) {
  if(!u.goals) u.goals = { enabled:false, cal:{min:'',max:''}, pro:{min:'',max:''}, carb:{min:'',max:''}, fat:{min:'',max:''} };
  const g = u.goals;
  const macros = [
    { key:'cal',  cls:'cal',  ico:MACRO_ICONS.cal,  name:tr('goalCalories'), unit:'kcal' },
    { key:'pro',  cls:'prot', ico:MACRO_ICONS.prot, name:tr('goalProtein'),  unit:'g' },
    { key:'carb', cls:'carb', ico:MACRO_ICONS.carb, name:tr('goalCarbs'),    unit:'g' },
    { key:'fat',  cls:'fat',  ico:MACRO_ICONS.fat,  name:tr('goalFat'),      unit:'g' },
  ];

  let h = `<div class="acct-section-title">${tr('goals')}</div>
    <div class="goals-form">
      <div class="goal-enable-row">
        <label class="goal-toggle">
          <input type="checkbox" ${g.enabled?'checked':''} onchange="currentUser.goals.enabled=this.checked">
          <div class="goal-toggle-track"></div>
        </label>
        <div>
          <div class="goal-enable-label">${tr('goalEnabled')}</div>
          <div class="goal-enable-sub">${tr('goalsDesc')}</div>
        </div>
      </div>
      <div class="goal-macro-grid">
        ${macros.map(m => `
          <div class="goal-macro-card">
            <div class="gmc-hdr">
              <div class="gmc-ico ${m.cls}">${m.ico}</div>
              <div class="gmc-name">${m.name}</div>
              <div class="gmc-unit">${m.unit}</div>
            </div>
            <div class="goal-inputs-row">
              <div class="goal-input-wrap">
                <div class="goal-input-lbl">${tr('goalMin')}</div>
                <input class="goal-input" type="number" id="goal-${m.key}-min" value="${g[m.key]?.min||''}" placeholder="0" oninput="onGoalInput('${m.key}','min',this.value)">
              </div>
              <div class="goal-input-wrap">
                <div class="goal-input-lbl">${tr('goalMax')}</div>
                <input class="goal-input" type="number" id="goal-${m.key}-max" value="${g[m.key]?.max||''}" placeholder="0" oninput="onGoalInput('${m.key}','max',this.value)">
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      <button class="btn-next" style="max-width:200px" onclick="saveGoals()">${lang==='el'?'Αποθήκευση':'Save'}</button>
    </div>`;

  // ── Intake History from past orders ──
  if(u.orders && u.orders.length && g.enabled) {
    h += `<div class="intake-history">
      <div class="acct-section-title" style="margin-top:32px">${tr('goalIntakeHistory')}</div>`;
    u.orders.forEach(o => {
      const dateLbl = lang==='el' ? o.date : (o.dateEn||o.date);
      h += `<div class="intake-order-card">
        <div class="intake-order-hdr">
          <span>${o.id} — ${dateLbl}</span>
          <span class="order-badge ${o.status==='active'?'badge-active':'badge-done'}">${o.status==='active'?(lang==='el'?'Ενεργή':'Active'):(lang==='el'?'Παραδόθηκε':'Delivered')}</span>
        </div>`;
      o.days.forEach(d => {
        const m = orderDayMacros(d);
        const dayName = d.day[lang] || d.day;
        const bars = [
          { k:'cal', v:m.cal, ico:MACRO_ICONS_SM.cal },
          { k:'pro', v:m.pro, ico:MACRO_ICONS_SM.prot },
          { k:'carb', v:m.carb, ico:MACRO_ICONS_SM.carb },
          { k:'fat', v:m.fat, ico:MACRO_ICONS_SM.fat },
        ];
        h += `<div class="intake-day-row">
          <div class="intake-day-name">${dayName}</div>
          <div class="intake-bars">
            ${bars.map(b => {
              const s = goalStatus(b.k, b.v);
              const pct = goalPct(b.k, b.v);
              return `<div class="intake-mini-bar">
                ${b.ico}
                <div class="intake-mini-track"><div class="intake-mini-fill ${s||'none'}" style="width:${Math.min(100,pct)}%"></div></div>
                <div class="intake-mini-val">${b.v}</div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      });
      h += `</div>`;
    });
    h += `</div>`;
  }

  el.innerHTML = h;
}

function onGoalInput(macro, bound, val) {
  if(!currentUser) return;
  if(!currentUser.goals) currentUser.goals = { enabled:false, cal:{min:'',max:''}, pro:{min:'',max:''}, carb:{min:'',max:''}, fat:{min:'',max:''} };
  if(!currentUser.goals[macro]) currentUser.goals[macro] = { min:'', max:'' };
  currentUser.goals[macro][bound] = val ? parseInt(val) : '';
}

function saveGoals() {
  showToast(tr('goalSaved'));
  // Re-render to update intake history colors if goals changed
  renderAccountContent();
  // Also update cart if open
  renderCart();
}

  h += `<div class="pref-section">
    <div class="pref-section-hdr">
      <div class="pref-section-ico payment">💳</div>
      <div>
        <div class="pref-section-title">${tr('prefPayment')}</div>
        <div class="pref-section-desc">${tr('prefPaymentDesc')}</div>
      </div>
    </div>
    <div class="pref-pay-grid">
      ${PAY_OPTS.map(po => `<div class="pref-pay-opt${p.paymentMethod===po.id?' sel':''}" onclick="currentUser.prefs.paymentMethod='${po.id}';renderAccountContent()">
        <div class="ppo-icon">${po.icon}</div>
        <div class="ppo-name">${po.label}</div>
      </div>`).join('')}
    </div>
  </div>`;

  // ── 3. Cutlery ──
  h += `<div class="pref-section">
    <div class="pref-section-hdr">
      <div class="pref-section-ico cutlery">🍴</div>
      <div class="pref-toggle-row" style="flex:1">
        <div class="pref-toggle-info">
          <div class="pref-toggle-label">${tr('prefCutlery')}</div>
          <div class="pref-toggle-sub">${tr('prefCutleryDesc')}</div>
        </div>
        <label class="goal-toggle">
          <input type="checkbox" ${p.cutlery?'checked':''} onchange="currentUser.prefs.cutlery=this.checked">
          <div class="goal-toggle-track"></div>
        </label>
      </div>
    </div>
  </div>`;

  // ── 4. Invoice ──
  h += `<div class="pref-section">
    <div class="pref-section-hdr">
      <div class="pref-section-ico invoice">🧾</div>
      <div class="pref-toggle-row" style="flex:1">
        <div class="pref-toggle-info">
          <div class="pref-toggle-label">${tr('prefInvoice')}</div>
          <div class="pref-toggle-sub">${tr('prefInvoiceDesc')}</div>
        </div>
        <label class="goal-toggle">
          <input type="checkbox" ${p.invoice?'checked':''} onchange="currentUser.prefs.invoice=this.checked">
          <div class="goal-toggle-track"></div>
        </label>
      </div>
    </div>
  </div>`;

  // ── 5. Language ──
  h += `<div class="pref-section">
    <div class="pref-section-hdr">
      <div class="pref-section-ico lang">🌐</div>
      <div>
        <div class="pref-section-title">${tr('prefLang')}</div>
        <div class="pref-section-desc">${tr('prefLangDesc')}</div>
      </div>
    </div>
    <div class="pref-lang-grid">
      <div class="pref-lang-opt${p.lang==='el'?' sel':''}" onclick="currentUser.prefs.lang='el';renderAccountContent()">
        <div class="plo-flag">🇬🇷</div>
        <div class="plo-name">Ελληνικά</div>
        <div class="plo-sub">Greek</div>
      </div>
      <div class="pref-lang-opt${p.lang==='en'?' sel':''}" onclick="currentUser.prefs.lang='en';renderAccountContent()">
        <div class="plo-flag">🇬🇧</div>
        <div class="plo-name">English</div>
        <div class="plo-sub">Αγγλικά</div>
      </div>
    </div>
  </div>`;

  // ── 6. Newsletter ──
  h += `<div class="pref-section">
    <div class="pref-section-hdr">
      <div class="pref-section-ico news">📬</div>
      <div class="pref-toggle-row" style="flex:1">
        <div class="pref-toggle-info">
          <div class="pref-toggle-label">${tr('prefNewsletter')}</div>
          <div class="pref-toggle-sub">${tr('prefNewsletterDesc')}</div>
        </div>
        <label class="goal-toggle">
          <input type="checkbox" ${p.newsletter?'checked':''} onchange="currentUser.prefs.newsletter=this.checked">
          <div class="goal-toggle-track"></div>
        </label>
      </div>
    </div>
  </div>`;

  // Save button
  h += `<button class="btn-next" style="max-width:200px" onclick="savePreferences()">${lang==='el'?'Αποθήκευση':'Save'}</button>`;
  h += `</div>`;
  el.innerHTML = h;
}

function savePreferences() {
  if(!currentUser) return;
  // Apply language preference immediately if changed
  if(currentUser.prefs.lang && currentUser.prefs.lang !== lang) {
    setLang(currentUser.prefs.lang);
  }
  showToast(tr('prefSaved'));
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
// Auto-select first available (non-closed cutoff) day
function initActiveDay() {
  const w = WEEK_DATA[activeWeek];
  if(!w || !w.iso) return;
  const now = new Date();
  for(let i = 0; i < 5; i++) {
    const cutoff = getCutoffDate(activeWeek, i);
    if(cutoff && cutoff > now) { activeDay = i; return; }
  }
  // All days closed in this week — try next week
  if(activeWeek < WEEK_DATA.length - 1) {
    activeWeek++;
    activeDay = 0;
  }
}
initActiveDay();

showLoader(lang==='el'?'Φόρτωση…':'Loading…');
setTimeout(() => {
  renderAll();
  renderHeader();
  hideLoader();
}, LOADER_MS);
</script>
