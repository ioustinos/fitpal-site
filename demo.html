<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fitpal meals — Παραγγελία</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2300B96B'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-family='system-ui,sans-serif' font-size='14' font-weight='900' fill='white' letter-spacing='-0.5'%3Efp%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════════
       FITPAL BRAND TOKENS
    ══════════════════════════════════════════ */
    :root {
      --green:       #00B96B;
      --green-dark:  #004739;
      --green-mid:   #006647;
      --green-light: #D4F5E5;
      --green-pale:  #F0FAF5;
      --cream:       #FCF2D9;
      --cream-dark:  #F0E3C0;
      --cream-light: #FFFDF5;
      --white:       #FFFFFF;
      --text:        #1C2B1C;
      --text-mid:    #3D5A3D;
      --text-muted:  #7A957A;
      --border:      #E2EDE2;
      --shadow:      rgba(0, 71, 57, 0.08);
      --shadow-md:   rgba(0, 71, 57, 0.14);
      --accent:      #FF6B35;
      --accent-light:#FFF0EA;
      --sidebar-w:   370px;
      --hdr:         50px;
      --radius:      8px;
      --radius-sm:   5px;
      --radius-lg:   12px;
    }

    /* ══════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--cream-light);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--cream-dark); border-radius: 10px; }
    button, input { font-family: inherit; }
    img { display: block; }

    /* ══════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════ */
    header {
      position: sticky; top: 0; z-index: 100;
      height: var(--hdr);
      background: var(--green-dark);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
    }
    .logo-icon {
      width: 30px; height: 30px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 900; color: var(--white); letter-spacing: -0.3px;
      box-shadow: 0 2px 8px rgba(0,185,107,0.4);
    }
    .logo-group {
      display: flex; align-items: baseline; gap: 8px;
    }
    .logo-text {
      font-size: 20px; font-weight: 900; letter-spacing: -0.5px;
      color: var(--white);
      line-height: 1;
    }
    .logo-text span { color: var(--green); }
    .logo-sub {
      font-size: 9px; font-weight: 600; letter-spacing: 2px;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
    }

    /* Language toggle */
    .lang-wrap { display: flex; align-items: center; gap: 12px; position: relative; }
    .lang-toggle {
      display: flex; background: rgba(255,255,255,0.1);
      border-radius: 999px; padding: 3px;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .lang-btn {
      padding: 5px 16px; border: none; background: transparent;
      border-radius: 999px; cursor: pointer;
      font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px; transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--green);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(0,185,107,0.4);
    }
    .lang-btn:hover:not(.active) { color: white; }

    /* ══════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════ */
    .layout {
      display: grid;
      grid-template-columns: 1fr var(--sidebar-w);
      min-height: calc(100vh - var(--hdr));
      max-width: 1460px;
      margin: 0 auto;
    }
    .main { padding: 28px 28px 40px; overflow-x: clip; }

    /* ══════════════════════════════════════════
       PAGE HEADER SECTION
    ══════════════════════════════════════════ */
    .page-banner {
      background: var(--green-dark);
      border-radius: var(--radius-lg);
      padding: 18px 24px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .page-banner::after {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 200px; height: 200px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0.12;
    }
    .page-banner::before {
      content: '';
      position: absolute;
      right: 60px; bottom: -60px;
      width: 140px; height: 140px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0.08;
    }
    .banner-top {
      display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .banner-heading {
      font-size: 22px; font-weight: 900; color: var(--white);
      letter-spacing: -0.5px;
    }
    .banner-heading span { color: var(--green); }
    .banner-sub {
      font-size: 13px; color: rgba(255,255,255,0.5);
    }
    .banner-pills {
      display: flex; gap: 8px; margin-top: 10px;
      flex-wrap: wrap; position: relative; z-index: 1;
    }
    .banner-pill {
      padding: 5px 14px; background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px; font-size: 11px; font-weight: 700;
      color: rgba(255,255,255,0.8); letter-spacing: 0.3px;
    }
    .banner-pill.green { background: rgba(0,185,107,0.25); border-color: rgba(0,185,107,0.4); color: #7DFFBE; }

    /* ══════════════════════════════════════════
       BANNER ROW (menu info + wallet promo)
    ══════════════════════════════════════════ */
    .banner-row {
      display: grid; grid-template-columns: 1fr 320px; gap: 16px;
      margin-bottom: 22px;
    }
    .banner-row .page-banner { margin-bottom: 0; }

    /* Wallet promo card */
    .wallet-promo {
      background: linear-gradient(135deg, #004739 0%, #006647 60%, #00B96B 100%);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
      cursor: pointer; transition: all 0.22s;
      border: 1.5px solid rgba(0,185,107,0.25);
    }
    .wallet-promo:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,185,107,0.3); border-color: rgba(0,185,107,0.5); }
    .wallet-promo::after {
      content:''; position:absolute; right:-30px; top:-30px;
      width:120px; height:120px; background:rgba(255,255,255,0.06);
      border-radius:50%;
    }
    .wallet-promo::before {
      content:''; position:absolute; left:-20px; bottom:-20px;
      width:80px; height:80px; background:rgba(0,185,107,0.15);
      border-radius:50%;
    }
    .wp-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(0,185,107,0.3); border:1px solid rgba(0,185,107,0.5);
      border-radius:999px; padding:3px 10px;
      font-size:9px; font-weight:900; color:#7DFFBE;
      text-transform:uppercase; letter-spacing:1px;
      width:fit-content; margin-bottom:8px;
      position:relative; z-index:1;
    }
    .wp-badge svg { width:12px; height:12px; }
    .wp-title {
      font-size:17px; font-weight:900; color:var(--white);
      letter-spacing:-0.3px; margin-bottom:4px;
      position:relative; z-index:1; line-height:1.2;
    }
    .wp-title span { color:#7DFFBE; }
    .wp-desc {
      font-size:12px; color:rgba(255,255,255,0.6);
      font-weight:600; line-height:1.4;
      position:relative; z-index:1; margin-bottom:10px;
    }
    .wp-plans-mini {
      display:flex; gap:6px; position:relative; z-index:1;
    }
    .wp-plan-chip {
      background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2);
      border-radius:999px; padding:4px 10px;
      font-size:10px; font-weight:800; color:rgba(255,255,255,0.85);
    }
    .wp-plan-chip .wp-bonus { color:#7DFFBE; font-weight:900; }
    .wp-cta {
      display:inline-flex; align-items:center; gap:5px;
      background:var(--green); color:var(--white);
      border:none; border-radius:999px; padding:7px 16px;
      font-size:11px; font-weight:900; cursor:pointer;
      transition:all 0.18s; margin-top:10px; width:fit-content;
      position:relative; z-index:1;
    }
    .wp-cta:hover { background:#00a060; }

    /* Wallet balance badge (header) */
    .wallet-hdr-badge {
      display:flex; align-items:center; gap:6px;
      background:rgba(0,185,107,0.2); border:1px solid rgba(0,185,107,0.35);
      border-radius:999px; padding:4px 12px 4px 8px;
      cursor:pointer; transition:all 0.18s;
    }
    .wallet-hdr-badge:hover { background:rgba(0,185,107,0.3); }
    .wallet-hdr-badge svg { width:16px; height:16px; color:#7DFFBE; }
    .wallet-hdr-amt {
      font-size:12px; font-weight:900; color:#7DFFBE;
    }

    /* Wallet balance in cart sidebar */
    .wallet-sidebar-bar {
      padding:10px 22px; background:linear-gradient(135deg, #004739, #006647);
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1.5px solid rgba(0,185,107,0.3);
      flex-shrink:0; cursor:pointer; transition:all 0.18s;
    }
    .wallet-sidebar-bar:hover { background:linear-gradient(135deg, #005a47, #007a55); }
    .wsb-left { display:flex; align-items:center; gap:8px; }
    .wsb-icon { width:28px; height:28px; border-radius:50%; background:rgba(0,185,107,0.25); display:flex; align-items:center; justify-content:center; }
    .wsb-icon svg { width:15px; height:15px; color:#7DFFBE; }
    .wsb-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.6); }
    .wsb-amt { font-size:15px; font-weight:900; color:#7DFFBE; }
    .wsb-right { display:flex; align-items:center; gap:6px; }
    .wsb-topup {
      padding:4px 12px; background:rgba(0,185,107,0.3); border:1px solid rgba(0,185,107,0.5);
      border-radius:999px; font-size:10px; font-weight:800; color:#7DFFBE;
      cursor:pointer; transition:all 0.18s;
    }
    .wsb-topup:hover { background:var(--green); color:var(--white); }

    /* Wallet subscription modal */
    .wallet-modal-overlay {
      position:fixed; inset:0; z-index:300;
      background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
      display:flex; align-items:center; justify-content:center;
      padding:20px; opacity:0; pointer-events:none; transition:all 0.25s;
    }
    .wallet-modal-overlay.open { opacity:1; pointer-events:all; }
    .wallet-modal {
      background:var(--cream-light); border-radius:16px;
      max-width:560px; width:100%; max-height:90vh; overflow-y:auto;
      box-shadow:0 24px 60px rgba(0,0,0,0.3);
      transform:translateY(20px); transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .wallet-modal-overlay.open .wallet-modal { transform:translateY(0); }
    .wm-header {
      background:linear-gradient(135deg, #004739, #006647);
      padding:28px 28px 24px; border-radius:16px 16px 0 0;
      position:relative; overflow:hidden;
    }
    .wm-header::after {
      content:''; position:absolute; right:-40px; top:-40px;
      width:160px; height:160px; background:rgba(0,185,107,0.1);
      border-radius:50%;
    }
    .wm-close {
      position:absolute; top:14px; right:14px; z-index:2;
      width:32px; height:32px; border-radius:50%;
      background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
      color:white; font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.18s;
    }
    .wm-close:hover { background:rgba(255,255,255,0.2); }
    .wm-title { font-size:22px; font-weight:900; color:var(--white); position:relative; z-index:1; }
    .wm-subtitle { font-size:13px; color:rgba(255,255,255,0.6); font-weight:600; margin-top:4px; position:relative; z-index:1; }
    .wm-balance-row {
      display:flex; align-items:center; gap:10px;
      margin-top:16px; position:relative; z-index:1;
    }
    .wm-bal-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.5px; }
    .wm-bal-amt { font-size:28px; font-weight:900; color:#7DFFBE; }

    .wm-body { padding:24px 28px 28px; }
    .wm-section-title {
      font-size:13px; font-weight:900; color:var(--green-dark);
      text-transform:uppercase; letter-spacing:0.5px;
      margin-bottom:14px;
    }
    .wm-plans {
      display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
      margin-bottom:24px;
    }
    .wm-plan {
      border:2px solid var(--border); border-radius:var(--radius);
      padding:18px 14px; text-align:center; cursor:pointer;
      transition:all 0.18s; background:var(--white); position:relative;
    }
    .wm-plan:hover, .wm-plan.sel {
      border-color:var(--green); background:var(--green-pale);
    }
    .wm-plan.sel { box-shadow:0 0 0 3px rgba(0,185,107,0.15); }
    .wm-plan-popular {
      position:absolute; top:-9px; left:50%; transform:translateX(-50%);
      background:var(--accent); color:var(--white);
      font-size:8px; font-weight:900; text-transform:uppercase;
      padding:2px 8px; border-radius:999px; letter-spacing:0.5px;
    }
    .wm-plan-price { font-size:24px; font-weight:900; color:var(--green-dark); }
    .wm-plan-price small { font-size:13px; font-weight:700; }
    .wm-plan-arrow { font-size:16px; color:var(--text-muted); margin:4px 0; }
    .wm-plan-credit { font-size:16px; font-weight:900; color:var(--green); }
    .wm-plan-credit small { font-size:11px; font-weight:700; }
    .wm-plan-bonus {
      display:inline-block; margin-top:6px;
      background:var(--green-light); color:var(--green-dark);
      font-size:10px; font-weight:900; padding:2px 8px;
      border-radius:999px;
    }
    .wm-plan-label {
      font-size:11px; font-weight:700; color:var(--text-muted); margin-top:6px;
    }
    .wm-renewal {
      background:var(--cream); border-radius:var(--radius);
      padding:14px 16px; margin-bottom:20px;
      border:1.5px solid var(--cream-dark);
    }
    .wm-renewal-title {
      font-size:12px; font-weight:800; color:var(--text); margin-bottom:8px;
    }
    .wm-renewal-opts { display:flex; gap:8px; }
    .wm-renewal-opt {
      flex:1; padding:9px; border:2px solid var(--border);
      border-radius:var(--radius-sm); text-align:center;
      font-size:12px; font-weight:800; cursor:pointer;
      transition:all 0.18s; background:var(--white); color:var(--text);
    }
    .wm-renewal-opt:hover, .wm-renewal-opt.sel {
      border-color:var(--green); background:var(--green-pale); color:var(--green-dark);
    }
    .wm-note {
      font-size:11px; color:var(--text-muted); font-weight:600;
      line-height:1.5; margin-bottom:20px;
      padding:10px 14px; background:var(--cream);
      border-radius:var(--radius-sm); border:1px solid var(--cream-dark);
    }
    .wm-note strong { color:var(--text); }
    .wm-subscribe-btn {
      width:100%; padding:15px;
      background:var(--green); color:var(--white);
      border:none; border-radius:var(--radius);
      font-size:15px; font-weight:900; cursor:pointer;
      transition:all 0.22s; letter-spacing:0.3px;
    }
    .wm-subscribe-btn:hover { background:var(--green-dark); box-shadow:0 8px 24px rgba(0,185,107,0.4); }

    /* Wallet payment option in checkout */
    .pay-opt.wallet-pay { background:linear-gradient(135deg, #F0FAF5, #D4F5E5); border-color:var(--green-light); }
    .pay-opt.wallet-pay.sel { border-color:var(--green); background:linear-gradient(135deg, #D4F5E5, #B8EED0); }
    .pay-opt.wallet-pay .po-balance { font-size:11px; font-weight:900; color:var(--green); margin-top:3px; }
    .pay-opt.wallet-pay.insufficient { opacity:0.6; }
    .pay-opt.wallet-pay.insufficient .po-balance { color:#EF4444; }

    /* Account wallet tab */
    .acct-wallet-card {
      background:linear-gradient(135deg, #004739, #006647, #00B96B);
      border-radius:var(--radius-lg); padding:24px;
      color:var(--white); position:relative; overflow:hidden;
      margin-bottom:20px;
    }
    .acct-wallet-card::after {
      content:''; position:absolute; right:-30px; top:-30px;
      width:140px; height:140px; background:rgba(255,255,255,0.06);
      border-radius:50%;
    }
    .aw-label { font-size:11px; font-weight:700; color:rgba(255,255,255,0.5); text-transform:uppercase; letter-spacing:0.5px; }
    .aw-balance { font-size:36px; font-weight:900; color:#7DFFBE; margin:4px 0; }
    .aw-detail { font-size:12px; font-weight:600; color:rgba(255,255,255,0.6); }
    .aw-plan-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(0,185,107,0.3); border:1px solid rgba(0,185,107,0.5);
      border-radius:999px; padding:4px 12px; margin-top:10px;
      font-size:11px; font-weight:800; color:#7DFFBE;
    }
    .aw-actions { display:flex; gap:10px; margin-top:14px; position:relative; z-index:1; }
    .aw-btn {
      padding:9px 18px; border-radius:999px;
      font-size:12px; font-weight:900; cursor:pointer;
      transition:all 0.18s; border:none;
    }
    .aw-btn-topup { background:var(--green); color:var(--white); }
    .aw-btn-topup:hover { background:#00a060; }
    .aw-btn-manage { background:rgba(255,255,255,0.15); color:var(--white); border:1px solid rgba(255,255,255,0.25); }
    .aw-btn-manage:hover { background:rgba(255,255,255,0.25); }
    .aw-history { margin-top:20px; }
    .aw-history-title { font-size:13px; font-weight:900; color:var(--green-dark); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:12px; }
    .aw-tx {
      display:flex; align-items:center; gap:12px;
      padding:12px 0; border-bottom:1px solid var(--border);
    }
    .aw-tx:last-child { border-bottom:none; }
    .aw-tx-icon {
      width:36px; height:36px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; flex-shrink:0;
    }
    .aw-tx-icon.credit { background:var(--green-light); }
    .aw-tx-icon.debit { background:#FEF3C7; }
    .aw-tx-info { flex:1; }
    .aw-tx-desc { font-size:13px; font-weight:700; color:var(--text); }
    .aw-tx-date { font-size:11px; font-weight:600; color:var(--text-muted); }
    .aw-tx-amt { font-size:14px; font-weight:900; }
    .aw-tx-amt.credit { color:var(--green); }
    .aw-tx-amt.debit { color:var(--text); }

    /* ══════════════════════════════════════════
       DAY NAVIGATION
    ══════════════════════════════════════════ */
    .day-section { margin-bottom: 20px; }
    .day-section-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-label {
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .week-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
    }
    .day-nav { display: flex; gap: 6px; overflow-x: auto; padding: 8px 2px 4px; align-items: stretch; }
    .day-nav::-webkit-scrollbar { display: none; }
    .day-tab {
      flex: 0 0 auto; min-width: 82px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px; cursor: pointer;
      text-align: center; transition: all 0.18s;
      position: relative;
    }
    .day-tab:hover { border-color: var(--green); }
    .day-tab.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      box-shadow: 0 3px 10px rgba(0,71,57,0.25);
    }
    .day-tab .dn {
      font-size: 13px; font-weight: 800; color: var(--text);
      transition: color 0.18s; line-height: 1.2;
    }
    .day-tab.active .dn { color: var(--white); }
    .day-tab .dd {
      font-size: 10px; color: var(--text-muted); margin-top: 2px;
      font-weight: 600; transition: color 0.18s;
    }
    .day-tab.active .dd { color: rgba(255,255,255,0.5); }
    .day-badge {
      position: absolute; top: -6px; right: -6px;
      background: var(--green); color: var(--white);
      border-radius: 999px; min-width: 18px; height: 18px; padding: 0 4px;
      font-size: 9px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--cream-light);
    }
    /* Week toggle button — sits at start/end of day-nav */
    .week-toggle {
      flex: 0 0 auto;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px;
      padding: 8px 14px;
      background: var(--cream); border: 1.5px dashed var(--cream-dark);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.18s; white-space: nowrap; min-width: 72px;
    }
    .week-toggle:hover { border-color: var(--green); background: var(--green-pale); }
    .wt-arrow { font-size: 14px; line-height: 1; color: var(--green-dark); font-weight: 900; }
    .wt-label { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    /* Week transition fade */
    .day-nav.week-anim { animation: weekFade 0.22s ease; }
    @keyframes weekFade { from { opacity:0; transform: translateX(10px); } to { opacity:1; transform: translateX(0); } }

    /* ── Cutoff indicator ── */
    .cutoff-bar {
      display: none; align-items: center; gap: 8px;
      margin-top: 10px; padding: 8px 14px;
      border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 700;
      animation: cutoffFadeIn 0.25s ease;
    }
    .cutoff-bar.visible { display: flex; }
    .cutoff-bar .cutoff-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .cutoff-bar .cutoff-text { flex: 1; }
    .cutoff-bar .cutoff-time { font-weight: 900; }

    /* States */
    .cutoff-bar.open {
      background: var(--green-pale); border: 1px solid rgba(0,185,107,0.2);
      color: var(--green-dark);
    }
    .cutoff-bar.open .cutoff-icon svg { stroke: var(--green); }

    .cutoff-bar.urgent {
      background: #FFF3E6; border: 1px solid #FFD9A8;
      color: #92400E;
    }
    .cutoff-bar.urgent .cutoff-icon svg { stroke: #D97706; }
    .cutoff-bar.urgent .cutoff-time { color: #D97706; }
    .cutoff-bar.urgent .cutoff-minutes {
      display: inline-flex; align-items: center; gap: 4px;
      background: #D97706; color: white;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 900;
    }

    .cutoff-bar.closed {
      background: #FEF2F2; border: 1px solid #FECACA;
      color: #991B1B;
    }
    .cutoff-bar.closed .cutoff-icon svg { stroke: #EF4444; }

    @keyframes cutoffFadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform: translateY(0); } }

    /* ══════════════════════════════════════════
       CATEGORY TABS
    ══════════════════════════════════════════ */
    .cat-nav {
      display: flex; gap: 0;
      overflow-x: auto; padding-bottom: 0;
      margin-bottom: 28px;
      position: sticky; top: var(--hdr); z-index: 90;
      background: var(--cream-light);
      padding-top: 12px;
      margin-left: -28px; margin-right: -28px;
      padding-left: 22px; padding-right: 28px;
      border-bottom: 1.5px solid var(--border);
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-pill {
      flex: 0 0 auto;
      padding: 10px 18px 12px;
      font-size: 13px; font-weight: 700;
      color: var(--text-muted);
      cursor: pointer; white-space: nowrap;
      transition: color 0.18s;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px; /* sit on top of nav border */
      display: flex; align-items: center; gap: 6px;
    }
    .cat-pill:hover { color: var(--text); }
    .cat-pill.active {
      color: var(--green-dark);
      font-weight: 900;
      border-bottom-color: var(--green);
    }
    .cat-count {
      font-size: 11px; font-weight: 700;
      color: var(--text-muted); opacity: 0.65;
      margin-left: 1px;
    }
    .cat-pill.active .cat-count { color: var(--green-dark); opacity: 1; }
    .menu-empty {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px;
    }
    .menu-empty-icon { font-size: 48px; margin-bottom: 12px; }
    .menu-empty-text { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .menu-empty-sub  { font-size: 13px; font-weight: 600; color: var(--text-muted); }

    /* ══════════════════════════════════════════
       MENU GRID & CATEGORY SECTIONS
    ══════════════════════════════════════════ */
    .menu-grid { display: flex; flex-direction: column; gap: 0; }
    .cat-section { margin-bottom: 40px; scroll-margin-top: 155px; }
    .cat-section-hdr {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 18px; padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border);
    }
    .cat-section-name { font-size: 17px; font-weight: 900; color: var(--green-dark); letter-spacing: -0.3px; flex: 1; }
    .cat-section-count {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
    }
    .cat-section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    /* ══════════════════════════════════════════
       DISH CARD
    ══════════════════════════════════════════ */
    .dish-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      border: 1.5px solid var(--border);
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      display: flex; flex-direction: column;
    }
    .dish-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px var(--shadow-md);
      border-color: transparent;
    }

    /* Image area — 3:2 ratio matching order.wecook.gr */
    .dish-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      background: var(--green-dark);
      flex-shrink: 0;
    }
    .dish-img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    .dish-card:hover .dish-img { transform: scale(1.06); }
    .dish-img-fallback {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 64px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    }
    .dish-tags {
      position: absolute; top: 10px; left: 10px;
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .tag {
      padding: 3px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.2px;
      backdrop-filter: blur(8px);
    }
    .tag-hot  { background: rgba(255,107,53,0.9); color: white; }
    .tag-veg  { background: rgba(0,185,107,0.9);  color: white; }
    .tag-lc   { background: rgba(255,255,255,0.9); color: var(--green-dark); }

    /* Price badge on image */
    .price-badge {
      position: absolute; bottom: 10px; right: 10px;
      background: var(--green-dark);
      color: var(--white);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 14px; font-weight: 900;
      backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .price-badge .from { font-size: 9px; font-weight: 600; opacity: 0.65; }
    /* Discounted price badge */
    .price-badge.has-disc { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; padding: 5px 12px; }
    .price-badge-was { font-size: 10px; font-weight: 700; text-decoration: line-through; opacity: 0.55; line-height: 1; }
    .price-badge-now { font-size: 14px; font-weight: 900; line-height: 1; }
    /* Discount ribbon on card image */
    .disc-ribbon {
      position: absolute; top: 10px; right: 10px;
      background: #E53935; color: white;
      border-radius: 999px; padding: 5px 12px;
      font-size: 12px; font-weight: 900; letter-spacing: 0.4px;
      box-shadow: 0 2px 8px rgba(229,57,53,0.55);
      z-index: 3;
    }
    /* Discount line in card body */
    .disc-card-line {
      display: flex; align-items: center; gap: 6px;
      margin-top: 1px; margin-bottom: 4px;
    }
    .disc-card-pct {
      background: #E53935; color: white;
      border-radius: 999px; padding: 2px 8px;
      font-size: 10px; font-weight: 900; letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .disc-card-was { font-size: 11px; font-weight: 700; text-decoration: line-through; color: var(--text-muted); }
    .disc-card-arr { font-size: 11px; color: var(--text-muted); }
    .disc-card-now { font-size: 13px; font-weight: 900; color: #E53935; }
    /* Cart item discount */
    .ci-price-was { font-size: 9px; font-weight: 700; text-decoration: line-through; color: var(--text-muted); }
    /* Checkout summary voucher line */
    .co-sum-voucher {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; font-size: 12px; font-weight: 800;
      border-top: 1.5px dashed var(--green-light); margin-top: 6px;
    }
    .co-sum-voucher-label { color: var(--green-dark); }
    .co-sum-voucher-amount { color: var(--green); font-size: 14px; }
    /* Voucher input row */
    .voucher-row { display: flex; gap: 8px; align-items: stretch; }
    .voucher-input {
      flex: 1; padding: 11px 15px;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 800; outline: none;
      background: var(--white); color: var(--text); transition: all 0.2s;
      text-transform: uppercase; letter-spacing: 1px;
      font-family: inherit;
    }
    .voucher-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,185,107,0.12); }
    .btn-apply {
      padding: 11px 18px; background: var(--green-dark); color: white;
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 900; cursor: pointer;
      transition: all 0.18s; white-space: nowrap; font-family: inherit;
    }
    .btn-apply:hover { background: var(--green); }
    .voucher-applied-row {
      margin-top: 8px; padding: 10px 14px;
      background: var(--green-pale); border: 1.5px solid var(--green-light);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: space-between;
    }
    .voucher-applied-info { display: flex; flex-direction: column; gap: 2px; }
    .voucher-applied-code { font-size: 12px; font-weight: 900; color: var(--green-dark); letter-spacing: 0.5px; }
    .voucher-applied-save { font-size: 11px; font-weight: 700; color: var(--green); }
    .btn-remove-voucher {
      background: none; border: 1.5px solid var(--border); cursor: pointer;
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      padding: 4px 10px; border-radius: 999px; transition: all 0.18s;
      font-family: inherit;
    }
    .btn-remove-voucher:hover { border-color: #EF4444; color: #EF4444; }

    /* Card body */
    .dish-body { padding: 16px; flex: 1; display: flex; flex-direction: column; }
    .dish-name {
      font-size: 15px; font-weight: 900; color: var(--text);
      margin-bottom: 5px; line-height: 1.3;
    }
    .dish-desc {
      font-size: 12px; color: var(--text-muted); line-height: 1.5;
      margin-bottom: 14px; flex: 1;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Macros on menu cards */
    .macros {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 5px; margin-bottom: 14px;
    }
    .macro {
      background: var(--cream);
      border-radius: 10px; padding: 6px 4px; text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }
    .macro-ico { width: 13px; height: 13px; opacity: 0.7; }
    .macro-ico svg { width: 100%; height: 100%; }
    .macro.cal  .macro-ico { color: #D97706; }
    .macro.prot .macro-ico { color: #059669; }
    .macro.carb .macro-ico { color: #B8860B; }
    .macro.fat  .macro-ico { color: #C2703A; }
    .macro-v {
      font-size: 9px; font-weight: 800;
      color: var(--green-dark); line-height: 1.15;
    }
    .macro-l {
      font-size: 8px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.3px; margin-top: 1px;
    }
    /* Scale-level dots */
    .macro-dots { display: flex; gap: 3px; margin-top: 2px; }
    .macro-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--cream-dark); transition: background 0.2s;
    }
    .macro-dot.filled { background: var(--green); }
    .macro.cal  .macro-dot.filled { background: #D97706; }
    .macro.prot .macro-dot.filled { background: #059669; }
    .macro.carb .macro-dot.filled { background: #B8860B; }
    .macro.fat  .macro-dot.filled { background: #C2703A; }

    /* Add button */
    .btn-add {
      width: 100%;
      padding: 11px;
      background: var(--green);
      color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
    }
    .btn-add:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,185,107,0.4); }

    /* ══════════════════════════════════════════
       CART SIDEBAR
    ══════════════════════════════════════════ */
    .sidebar {
      background: var(--white);
      border-left: 1.5px solid var(--border);
      display: flex; flex-direction: column;
      position: sticky; top: var(--hdr);
      height: calc(100vh - var(--hdr));
      overflow: hidden;
    }

    .sidebar-hdr {
      padding: 20px 22px 16px;
      background: var(--cream);
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 18px; font-weight: 900; color: var(--green-dark);
      margin-bottom: 2px;
    }
    .sidebar-sub { font-size: 12px; color: var(--text-muted); font-weight: 600; }

    /* Empty state */
    .cart-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center;
    }
    .cart-empty-img {
      width: 90px; height: 90px;
      background: var(--cream);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; margin-bottom: 16px;
    }
    .cart-empty-title { font-size: 16px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .cart-empty-sub { font-size: 13px; color: var(--text-muted); font-weight: 600; }

    /* Cart items */
    .cart-scroll { flex: 1; overflow-y: auto; padding: 16px 22px; }
    .cart-day-block { margin-bottom: 20px; }
    .cart-day-hdr {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }
    .cart-day-name {
      font-size: 10px; font-weight: 900; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .cart-day-amt {
      font-size: 12px; font-weight: 800;
      padding: 2px 10px; border-radius: 999px;
    }
    .cart-day-amt.ok   { background: var(--green-light); color: var(--green-dark); }
    .cart-day-amt.low  { background: #FEF3C7; color: #92400E; }

    .cart-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .ci-thumb {
      width: 44px; height: 44px; border-radius: 10px;
      overflow: hidden; flex-shrink: 0;
      background: var(--cream);
    }
    .ci-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .ci-thumb-emoji {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-size: 12px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ci-var  { font-size: 10px; font-weight: 600; color: var(--text-muted); margin-top: 1px; }
    .ci-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
    .ci-price { font-size: 13px; font-weight: 900; color: var(--green-dark); }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--white);
      cursor: pointer; font-size: 15px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.18s; color: var(--text); line-height: 1;
    }
    .qty-btn:hover { background: var(--green); color: white; border-color: var(--green); }
    .qty-n { font-size: 13px; font-weight: 900; min-width: 18px; text-align: center; }

    /* Cart footer */
    .cart-ftr {
      padding: 16px 22px; border-top: 2px solid var(--border);
      background: var(--cream); flex-shrink: 0;
    }
    .cart-total-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
    .cart-total-lbl { font-size: 14px; font-weight: 800; color: var(--text); }
    .cart-total-amt { font-size: 26px; font-weight: 900; color: var(--green-dark); }
    .btn-checkout {
      width: 100%; padding: 15px;
      background: var(--green);
      color: var(--white); border: none;
      border-radius: var(--radius);
      font-size: 15px; font-weight: 900; cursor: pointer;
      transition: all 0.22s; letter-spacing: 0.3px;
    }
    .btn-checkout:hover:not(:disabled) {
      background: var(--green-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,185,107,0.4);
    }
    .btn-checkout:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .min-warn {
      text-align: center; margin-top: 8px;
      font-size: 11px; color: #B45309; font-weight: 700;
    }

    /* ══════════════════════════════════════════
       MOBILE FAB
    ══════════════════════════════════════════ */
    .fab {
      display: none; position: fixed;
      bottom: 22px; right: 22px; z-index: 150;
      background: var(--green-dark); color: var(--white);
      border: none; border-radius: 999px;
      padding: 14px 24px;
      font-size: 14px; font-weight: 900;
      box-shadow: 0 8px 24px rgba(0,71,57,0.4);
      cursor: pointer;
      align-items: center; gap: 8px;
    }
    .fab-dot {
      width: 8px; height: 8px; background: var(--green);
      border-radius: 50%; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(1.4)} }

    /* ══════════════════════════════════════════
       PAGE LOADER
    ══════════════════════════════════════════ */
    .page-loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--cream-light);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      opacity: 1; transition: opacity 0.3s ease;
      pointer-events: all;
    }
    .page-loader.fade-out { opacity: 0; pointer-events: none; }
    .page-loader.hidden { display: none; }

    /* The spinner: ring with gradient stroke */
    .loader-ring {
      width: 48px; height: 48px; position: relative;
    }
    .loader-ring svg {
      width: 100%; height: 100%;
      animation: loader-spin 1s cubic-bezier(0.5, 0.15, 0.5, 0.85) infinite;
    }
    .loader-ring circle {
      fill: none; stroke-width: 3.5;
      stroke-linecap: round;
      stroke-dasharray: 90 150;
      stroke-dashoffset: 0;
    }
    @keyframes loader-spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }

    /* The fp badge in center */
    .loader-badge {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: var(--green-dark);
      letter-spacing: -0.5px;
      animation: loader-pulse 1s ease-in-out infinite;
    }
    @keyframes loader-pulse { 0%,100%{opacity:0.6;transform:scale(0.95)} 50%{opacity:1;transform:scale(1.05)} }

    /* Subtle text label */
    .loader-label {
      font-size: 12px; font-weight: 700; color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    /* ══════════════════════════════════════════
       OVERLAY / MODAL BASE
    ══════════════════════════════════════════ */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,30,20,0.55);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px; backdrop-filter: blur(6px);
    }

    /* ══════════════════════════════════════════
       DISH MODAL
    ══════════════════════════════════════════ */
    .dish-modal {
      background: var(--white); border-radius: 12px;
      width: 100%; max-width: 520px; max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 24px 72px rgba(0,0,0,0.25);
      position: relative;
    }
    .dm-close {
      position: absolute; top: 12px; right: 12px; z-index: 2;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s;
    }
    .dm-close:hover { background: rgba(0,0,0,0.65); }
    .dm-close svg { width: 16px; height: 16px; stroke: white; stroke-width: 2.5; fill: none; }
    .dm-img {
      width: 100%;
      aspect-ratio: 3 / 2;
      object-fit: cover;
      border-radius: 12px 12px 0 0;
      display: block;
    }
    .dm-img-fallback {
      width: 100%; aspect-ratio: 3 / 2;
      border-radius: 12px 12px 0 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 90px;
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    }
    .dm-body { padding: 24px; }
    .dm-name { font-size: 22px; font-weight: 900; margin-bottom: 7px; letter-spacing: -0.4px; }
    .dm-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 22px; font-weight: 600; }

    .dm-macros {
      display: grid; grid-template-columns: repeat(4,1fr);
      gap: 8px; margin-bottom: 24px;
      background: var(--cream); border-radius: 8px; padding: 16px;
    }
    .dm-macro { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .dm-macro-ico { width: 18px; height: 18px; opacity: 0.8; }
    .dm-macro-ico svg { width: 100%; height: 100%; }
    .dm-macro.cal  .dm-macro-ico { color: #D97706; }
    .dm-macro.prot .dm-macro-ico { color: #059669; }
    .dm-macro.carb .dm-macro-ico { color: #B8860B; }
    .dm-macro.fat  .dm-macro-ico { color: #C2703A; }
    .dm-macro-v { font-size: 20px; font-weight: 900; color: var(--green-dark); }
    .dm-macro-l { font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

    .dm-section-title { font-size: 13px; font-weight: 900; color: var(--text); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Smart variant dropdowns */
    .dm-smart-vars { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .sv-dim { background: var(--cream-light); border-radius: var(--radius-sm); padding: 10px 12px; }
    .sv-dim-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .sv-opts { display: flex; flex-wrap: wrap; gap: 5px; }
    .sv-opt {
      padding: 6px 12px; border: 1.5px solid var(--border);
      border-radius: 999px; font-size: 12px; font-weight: 700;
      color: var(--text); background: var(--white);
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .sv-opt:hover { border-color: var(--green); }
    .sv-opt.sel { border-color: var(--green); background: var(--green-pale); color: var(--green-dark); font-weight: 800; }
    .sv-opt.disabled { opacity: 0.35; pointer-events: none; }
    .sv-match { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--green-pale); border: 1.5px solid var(--green); border-radius: var(--radius-sm); margin-bottom: 24px; }
    .sv-match-label { font-size: 12px; font-weight: 700; color: var(--text); }
    .sv-match-price { font-size: 17px; font-weight: 900; color: var(--green-dark); }
    .dm-comment-wrap { margin-bottom: 20px; }
    .dm-comment-lbl { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .dm-comment {
      width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-family: inherit;
      color: var(--text); background: var(--white); resize: vertical;
      min-height: 38px; max-height: 100px; transition: border-color 0.18s;
    }
    .dm-comment:focus { outline: none; border-color: var(--green); }
    .dm-comment::placeholder { color: var(--text-muted); font-style: italic; opacity: 0.6; }
    .ci-comment { font-size: 11px; font-style: italic; color: var(--text-muted); margin-top: 2px; line-height: 1.3; }
    .dm-variants { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; max-height: 260px; overflow-y: auto; padding-right: 10px; margin-right: -10px; }
    .variant-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: all 0.18s;
    }
    .variant-row:hover, .variant-row.sel {
      border-color: var(--green); background: var(--green-pale);
    }
    .vr-radio {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border); flex-shrink: 0;
      position: relative; transition: all 0.18s;
    }
    .variant-row.sel .vr-radio { border-color: var(--green); background: var(--green); }
    .variant-row.sel .vr-radio::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 6px; height: 6px; border-radius: 50%; background: white;
    }
    .vr-info { flex: 1; min-width: 0; }
    .vr-label { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1.3; }
    .vr-macros { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 3px; }
    .vr-price { font-size: 17px; font-weight: 900; color: var(--green-dark); flex-shrink: 0; }

    .dm-actions { display: flex; gap: 10px; align-items: center; }
    .dm-qty {
      display: flex; align-items: center; gap: 0;
      border: 2px solid var(--border); border-radius: var(--radius-sm);
      overflow: hidden; flex-shrink: 0;
    }
    .dm-qty-btn {
      width: 38px; height: 42px; border: none; background: var(--cream);
      cursor: pointer; font-size: 18px; font-weight: 800; color: var(--text);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .dm-qty-btn:hover { background: var(--cream-dark); }
    .dm-qty-n {
      width: 36px; text-align: center; font-size: 16px; font-weight: 900;
      color: var(--text); background: var(--white);
    }
    .btn-dm-add {
      flex: 1; padding: 12px 16px;
      background: var(--green); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 900; cursor: pointer;
      transition: all 0.22s;
    }
    .btn-dm-add:hover { background: var(--green-dark); box-shadow: 0 6px 20px rgba(0,185,107,0.4); }

    /* ══════════════════════════════════════════
       CHECKOUT PAGE (full-page, replaces layout)
    ══════════════════════════════════════════ */
    #checkout-page {
      min-height: calc(100vh - var(--hdr));
      background: var(--cream-light);
      padding: 32px 28px 60px;
    }
    .co-page-inner {
      max-width: 1080px; margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px; align-items: start;
    }
    .co-page-left {
      background: transparent;
      overflow: hidden;
    }
    .co-page-top {
      padding: 0 4px 0;
      display: flex; align-items: center; gap: 14px;
    }
    .btn-co-back {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--cream);
      cursor: pointer; font-size: 18px; font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      color: var(--text); transition: all 0.2s; flex-shrink: 0;
    }
    .btn-co-back:hover { background: var(--green-dark); color: white; border-color: var(--green-dark); }
    .co-page-title { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.3px; }

    /* Section progress nav */
    .co-sections-nav {
      display: flex; padding: 12px 4px 0; gap: 6px;
    }
    .co-sec-pill {
      padding: 7px 16px; border-radius: 999px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.3px;
      cursor: pointer; transition: all 0.2s;
      background: var(--cream); color: var(--text-muted);
      border: 1.5px solid var(--cream-dark);
    }
    .co-sec-pill.active {
      background: var(--green-pale); color: var(--green-dark);
      border-color: var(--green);
    }
    .co-sec-pill.done {
      background: var(--green-dark); color: var(--white);
      border-color: var(--green-dark);
    }
    .co-sec-pill .pill-check { display: none; }
    .co-sec-pill.done .pill-check { display: inline; }
    .co-sec-pill.done .pill-num { display: none; }

    /* Checkout body — all sections stacked */
    .co-body { padding: 16px 0 6px; }
    .co-section {
      margin-bottom: 20px; scroll-margin-top: calc(var(--hdr) + 20px);
      background: var(--white); border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      padding: 22px 24px; box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .co-section:last-child { margin-bottom: 0; }

    /* Checkout footer */
    .co-ftr {
      padding: 16px 24px; display: flex; gap: 10px;
      background: var(--white); border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      margin-top: 12px;
    }

    /* Right cart panel (checkout) */
    .co-page-right { position: sticky; top: calc(var(--hdr) + 20px); }
    .co-summary-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }

    /* Form */
    .fsec { margin-bottom: 0; }
    .fsec-title {
      font-size: 15px; font-weight: 900; color: var(--green-dark);
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 16px;
    }
    .day-deliv-block {
      border-radius: var(--radius);
      padding: 18px; margin-bottom: 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .day-deliv-block:last-child { margin-bottom: 0; }
    .ddb-title {
      font-size: 14px; font-weight: 900; color: var(--green-dark);
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1.5px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .ddb-title::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); flex-shrink: 0;
    }
    .ddb-zone {
      background: var(--cream-light); border-radius: var(--radius-sm);
      padding: 12px 14px; margin-bottom: 12px;
    }
    .ddb-zone:last-of-type { margin-bottom: 0; }
    .ddb-section-hdr {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 8px;
    }
    .ddb-section-ico { width: 14px; height: 14px; opacity: 0.6; }
    .ddb-section-ico svg { width: 100%; height: 100%; }
    .ddb-save-btn {
      display: none; margin-top: 10px; padding: 8px 18px;
      background: var(--green-pale); border: 1.5px solid var(--green);
      border-radius: var(--radius-sm); font-size: 11px; font-weight: 800;
      color: var(--green-dark); cursor: pointer; transition: all 0.2s;
    }
    .ddb-save-btn:hover { background: var(--green); color: var(--white); }
    .ddb-save-btn.visible { display: inline-block; }
    .flabel {
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px;
      margin-bottom: 6px; display: block;
    }
    .finput {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      transition: all 0.2s; outline: none; background: var(--white);
      color: var(--text);
    }
    .finput:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,185,107,0.12); }
    .finput.err   { border-color: #EF4444; }
    .fwrap { margin-bottom: 10px; }
    .fnote { font-size: 11px; font-weight: 700; margin-top: 4px; }
    .fnote.ok  { color: var(--green); }
    .fnote.bad { color: #EF4444; }
    .fnote.hint{ color: var(--text-muted); }

    .time-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
    .tslot {
      padding: 9px 4px; border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      text-align: center; font-size: 11px; font-weight: 800;
      cursor: pointer; transition: all 0.18s;
      background: var(--white); color: var(--text);
    }
    .tslot:hover, .tslot.sel {
      border-color: var(--green);
      background: var(--green-pale);
      color: var(--green-dark);
    }

    /* Payment options */
    .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
    .pay-opt {
      padding: 16px; border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: all 0.18s;
    }
    .pay-opt:hover, .pay-opt.sel {
      border-color: var(--green); background: var(--green-pale);
    }
    .po-icon { font-size: 24px; margin-bottom: 8px; }
    .po-name { font-size: 13px; font-weight: 900; color: var(--text); }
    .po-desc { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 2px; }

    /* Extras */
    .extras-group { display: flex; flex-direction: column; gap: 12px; }
    .extra-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .extra-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
    .extra-row label { font-size: 14px; font-weight: 700; cursor: pointer; color: var(--text); }
    .invoice-extra { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }

    /* Order summary in payment */
    .sum-day { margin-bottom: 16px; }
    .sum-day-title { font-size: 14px; font-weight: 900; color: var(--green-dark); margin-bottom: 8px; }
    .sum-row {
      display: flex; justify-content: space-between;
      font-size: 14px; font-weight: 600; padding: 7px 0;
      border-bottom: 1px solid var(--border); color: var(--text);
    }
    .sum-row:last-child { border-bottom: none; }
    .sum-total {
      display: flex; justify-content: space-between;
      font-size: 19px; font-weight: 900; color: var(--green-dark);
      border-top: 2px solid var(--green-light); padding-top: 12px; margin-top: 10px;
    }

    /* Checkout action buttons */
    .btn-back {
      padding: 13px 22px; border: 2px solid var(--border);
      border-radius: var(--radius-sm); background: var(--white);
      cursor: pointer; font-size: 14px; font-weight: 900;
      color: var(--text); transition: all 0.2s;
    }
    .btn-back:hover { background: var(--cream); border-color: var(--cream-dark); }
    .btn-next {
      flex: 1; padding: 14px;
      background: var(--green); color: var(--white);
      border: none; border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 900; cursor: pointer;
      transition: all 0.22s;
    }
    .btn-next:hover:not(:disabled) { background: var(--green-dark); box-shadow: 0 6px 20px rgba(0,185,107,0.4); }
    .btn-next:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

    /* Summary cards in checkout */
    .sum-card {
      background: var(--cream); border-radius: var(--radius);
      padding: 18px; border: 1.5px solid var(--cream-dark);
    }

    /* ══════════════════════════════════════════
       CONFIRMATION
    ══════════════════════════════════════════ */
    .confirmation { text-align: center; padding: 36px 26px; }
    .conf-anim {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--green-light); margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .conf-title { font-size: 26px; font-weight: 900; color: var(--green-dark); margin-bottom: 8px; letter-spacing: -0.5px; }
    .conf-sub { font-size: 14px; color: var(--text-muted); font-weight: 600; margin-bottom: 26px; line-height: 1.6; }
    .conf-summary {
      background: var(--cream); border-radius: var(--radius);
      padding: 20px; text-align: left; margin-bottom: 24px;
      border: 1.5px solid var(--cream-dark);
    }
    .conf-day { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--cream-dark); }
    .conf-day:last-child { margin-bottom: 0; border-bottom: none; padding-bottom: 0; }
    .conf-day-name { font-size: 14px; font-weight: 900; color: var(--green-dark); }
    .conf-day-meta { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 2px; }
    .conf-day-items { margin-top: 8px; }
    .conf-item {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 3px 0; font-size: 12px; font-weight: 600; color: var(--text);
    }
    .conf-item-name { flex: 1; min-width: 0; }
    .conf-item-qty { color: var(--text-muted); margin-right: 6px; font-weight: 700; }
    .conf-item-price { font-weight: 800; white-space: nowrap; }
    .conf-item-comment { font-size: 11px; font-style: italic; color: var(--text-muted); padding-left: 18px; }
    .conf-day-amt { font-size: 13px; font-weight: 800; color: var(--text); margin-top: 6px; text-align: right; }
    .conf-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-conf-pdf {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 24px; background: var(--cream);
      border: 1.5px solid var(--cream-dark); border-radius: 999px;
      font-size: 13px; font-weight: 800; color: var(--text);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-conf-pdf:hover { background: var(--cream-dark); }
    .conf-total {
      display: flex; justify-content: space-between;
      border-top: 2px solid var(--green-light); padding-top: 12px; margin-top: 12px;
      font-size: 18px; font-weight: 900; color: var(--green-dark);
    }
    .btn-back-menu {
      display: inline-block; padding: 14px 32px;
      background: var(--green-dark); color: var(--white);
      border: none; border-radius: 999px;
      font-size: 15px; font-weight: 900; cursor: pointer;
      transition: all 0.22s;
    }
    .btn-back-menu:hover { background: var(--green); box-shadow: 0 6px 20px rgba(0,185,107,0.4); transform: translateY(-2px); }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--green-dark); color: white;
      padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 800;
      z-index: 999; opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    /* ── 960px: hide sidebar, show FAB ── */
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .fab { display: flex; }
      .banner-row { grid-template-columns: 1fr; gap: 10px; }
    }

    /* ── 768px: tablet – force single column dish grid ── */
    @media (max-width: 768px) {
      .cat-section-grid { grid-template-columns: 1fr; }
    }

    /* ── 640px: mobile ── */
    @media (max-width: 640px) {
      /* Layout & spacing */
      .main { padding: 14px 14px 110px; }
      header { padding: 0 14px; height: 46px; }
      :root { --hdr: 46px; }

      /* Banner row */
      .banner-row { grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px; }
      .page-banner { padding: 14px 16px 16px; }
      .banner-top { gap: 6px; }
      .banner-heading { font-size: 17px; }
      .banner-sub { font-size: 11px; }
      .banner-pills { gap: 6px; margin-top: 8px; }
      .banner-pill { font-size: 10px; padding: 4px 11px; }
      .wallet-promo { padding: 14px 16px; }
      .wp-title { font-size: 14px; }
      .wp-plans-mini { flex-wrap: wrap; }
      .wm-plans { grid-template-columns: 1fr; }
      .wallet-modal { max-width: 100%; margin: 10px; }

      /* Day nav tabs – more compact */
      .day-section { margin-bottom: 16px; }
      .day-tab { min-width: 66px; padding: 7px 8px; }
      .day-tab .dn { font-size: 12px; }
      .day-tab .dd { font-size: 9px; }
      .week-toggle { min-width: 60px; padding: 7px 10px; }

      /* Category nav – align with new padding */
      .cat-nav { margin-left: -14px; margin-right: -14px; padding-left: 12px; }
      .cat-pill { font-size: 12px; padding: 9px 13px 11px; }
      .cat-section { scroll-margin-top: 140px; }

      /* Cat section header */
      .cat-section-name { font-size: 16px; }

      /* Dish card grid – single column */
      .cat-section-grid { grid-template-columns: 1fr; }

      /* Dish card – horizontal layout on mobile */
      .dish-card { flex-direction: row; min-height: 110px; }
      .dish-card:hover { transform: none; box-shadow: none; border-color: var(--border); }
      .dish-card:active { background: var(--cream-light); }
      .dish-img-wrap { width: 115px; min-width: 115px; aspect-ratio: auto; height: auto; align-self: stretch; border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
      .dish-body { padding: 11px 12px 11px; flex: 1; min-width: 0; }
      .dish-name { font-size: 13px; margin-bottom: 2px; white-space: normal; }
      .disc-card-line { margin-top: 1px; margin-bottom: 3px; }
      .dish-desc { font-size: 11px; margin-bottom: 8px; -webkit-line-clamp: 2; }
      .macros { display: none; }
      .btn-add { padding: 7px 12px; font-size: 11px; width: auto; align-self: flex-start; }

      /* Dish modal – bottom sheet */
      .overlay { align-items: flex-end; padding: 0; }
      .dish-modal { border-radius: 16px 16px 0 0; max-width: 100%; max-height: 90vh; width: 100%; }
      .dm-img, .dm-img-fallback { border-radius: 16px 16px 0 0; }

      /* FAB */
      .fab { bottom: 16px; right: 16px; left: 16px; border-radius: 14px; justify-content: center; padding: 15px 20px; }

      /* Checkout */
      .co-page-inner { grid-template-columns: 1fr; }
      .co-page-right { position: static; order: -1; }
      #checkout-page { padding: 12px 14px 80px; }
      .co-page-top { padding: 16px 16px 0; }
      .co-sections-nav { padding: 12px 16px 0; gap: 4px; flex-wrap: wrap; }
      .co-sec-pill { padding: 6px 12px; font-size: 10px; }
      .co-body { padding: 12px 0 6px; }
      .co-section { padding: 16px 16px; }
      .co-page-top { padding: 0; }
      .co-ftr { padding: 12px 16px; }
      .time-grid { grid-template-columns: repeat(3,1fr); }
      .pay-grid { grid-template-columns: 1fr 1fr; }
      .co-summary-card { border-radius: var(--radius); }
    }

    /* ── 400px: small phones ── */
    @media (max-width: 400px) {
      .dish-img-wrap { width: 100px; min-width: 100px; height: 100px; }
      .pay-grid { grid-template-columns: 1fr; }
      .time-grid { grid-template-columns: repeat(2,1fr); }
    }

    /* ══════════════════════════════════════════
       AUTH HEADER ELEMENTS
    ══════════════════════════════════════════ */
    .btn-login {
      padding: 7px 18px; background: var(--green);
      color: var(--white); border: none; border-radius: 999px;
      font-size: 12px; font-weight: 900; cursor: pointer;
      letter-spacing: 0.3px; transition: all 0.18s; font-family: inherit;
    }
    .btn-login:hover { background: #00a060; }
    .user-btn-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 4px 10px 4px 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px; transition: all 0.18s;
      position: relative;
    }
    .user-btn-wrap:hover { background: rgba(255,255,255,0.18); }
    .user-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--green); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; letter-spacing: -0.3px;
    }
    .user-name-hdr { font-size: 12px; font-weight: 800; color: white; }
    .user-caret { font-size: 9px; color: rgba(255,255,255,0.6); }
    .user-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: var(--radius); min-width: 180px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.14); z-index: 300;
      overflow: hidden;
    }
    .ud-item {
      padding: 11px 16px; font-size: 13px; font-weight: 700;
      color: var(--text); cursor: pointer; transition: background 0.15s;
    }
    .ud-item:hover { background: var(--cream); }
    .ud-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .ud-logout { color: #EF4444; }
    .ud-logout:hover { background: #FEF2F2; }

    /* ══════════════════════════════════════════
       AUTH MODAL BOX
    ══════════════════════════════════════════ */
    .auth-box {
      background: var(--white); border-radius: var(--radius-lg);
      width: 100%; max-width: 420px;
      padding: 32px 32px 28px;
      box-shadow: 0 24px 72px rgba(0,0,0,0.22);
    }
    .auth-logo {
      font-size: 26px; font-weight: 900; color: var(--green-dark);
      letter-spacing: -0.5px; margin-bottom: 22px; text-align: center;
    }
    .auth-logo span { color: var(--green); }
    .auth-tabs {
      display: flex; border-bottom: 2px solid var(--border);
      margin-bottom: 22px; gap: 0;
    }
    .auth-tab {
      flex: 1; text-align: center; padding: 9px 12px;
      font-size: 12px; font-weight: 800; color: var(--text-muted);
      cursor: pointer; border-bottom: 2.5px solid transparent;
      margin-bottom: -2px; transition: all 0.18s;
    }
    .auth-tab.active { color: var(--green-dark); border-bottom-color: var(--green); }
    .auth-error { font-size: 12px; font-weight: 700; color: #EF4444; min-height: 16px; }
    .auth-hint { font-size: 11px; font-weight: 600; color: var(--text-muted); background: var(--cream); padding: 7px 12px; border-radius: var(--radius-sm); opacity: 0.45; cursor: pointer; transition: opacity 0.3s ease; }
    .auth-hint:hover { opacity: 0.65; }
    .auth-switch { font-size: 12px; font-weight: 600; color: var(--text-muted); text-align: center; }
    .auth-switch span { color: var(--green-dark); font-weight: 800; cursor: pointer; text-decoration: underline; }

    /* ══════════════════════════════════════════
       ADDRESS FIELDS LAYOUT
    ══════════════════════════════════════════ */
    .addr-form-wrap { margin-top: 6px; }
    .addr-form-hdr { margin-bottom: 8px; }
    .addr-form-cancel {
      font-size: 11px; font-weight: 800; color: var(--text-muted);
      cursor: pointer; transition: color 0.15s;
    }
    .addr-form-cancel:hover { color: var(--green-dark); }
    .addr-fields-row { display: flex; flex-direction: column; gap: 10px; }
    .addr-zip-city { display: grid; grid-template-columns: 120px 1fr; gap: 10px; }
    @media (max-width: 400px) { .addr-zip-city { grid-template-columns: 1fr; } }

    /* Address radio card picker */
    .addr-picker { display: flex; flex-direction: column; gap: 7px; }
    .addr-card {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.18s; background: var(--white);
    }
    .addr-card:hover { border-color: var(--green); background: var(--green-pale); }
    .addr-card.sel { border-color: var(--green); background: var(--green-pale); box-shadow: 0 0 0 3px rgba(0,185,107,0.08); }
    .addr-card-radio {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid var(--cream-dark); flex-shrink: 0;
      position: relative; transition: all 0.18s;
    }
    .addr-card.sel .addr-card-radio { border-color: var(--green); background: var(--green); }
    .addr-card.sel .addr-card-radio::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 5px; height: 5px; border-radius: 50%; background: white;
    }
    .addr-card-ico {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--cream); display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
    }
    .addr-card.sel .addr-card-ico { background: var(--green-light); }
    .addr-card-info { flex: 1; min-width: 0; }
    .addr-card-label { font-size: 12px; font-weight: 900; color: var(--text); }
    .addr-card-street { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .addr-card-new {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 12px; border: 1.5px dashed var(--cream-dark);
      border-radius: var(--radius-sm); cursor: pointer;
      font-size: 12px; font-weight: 800; color: var(--text-muted);
      background: var(--white); transition: all 0.18s;
    }
    .addr-card-new:hover { border-color: var(--green); color: var(--green-dark); background: var(--green-pale); }

    /* Collapsed address summary */
    .addr-summary {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 14px; background: var(--green-pale);
      border: 1.5px solid rgba(0,185,107,0.3); border-radius: var(--radius-sm);
    }
    .addr-summary-ico {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--green-light); display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 14px;
    }
    .addr-summary-text { flex: 1; min-width: 0; }
    .addr-summary-label { font-size: 12px; font-weight: 900; color: var(--green-dark); }
    .addr-summary-detail { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 1px; }
    .addr-summary-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; align-items: flex-end; }
    .addr-summary-edit {
      font-size: 11px; font-weight: 800; color: var(--green-dark);
      cursor: pointer; text-decoration: underline; transition: color 0.15s;
    }
    .addr-summary-edit:hover { color: var(--green); }
    .addr-summary-change {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      cursor: pointer; transition: color 0.15s;
    }
    .addr-summary-change:hover { color: var(--text); }

    /* Use for all days link */
    .addr-use-all {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 800; color: var(--green-dark);
      cursor: pointer; margin-top: 8px; padding: 5px 10px;
      background: var(--green-pale); border-radius: var(--radius-sm);
      transition: all 0.15s;
    }
    .addr-use-all:hover { background: var(--green-light); }

    /* ══════════════════════════════════════════
       FITNESS GOALS
    ══════════════════════════════════════════ */
    /* Goal dots in cart sidebar */
    .goal-dots-row {
      display: flex; align-items: center; gap: 6px;
      margin-left: auto; padding-left: 10px;
    }
    .goal-dot { width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; padding: 2px; }
    .goal-dot svg { width: 12px; height: 12px; }
    .goal-dot.ok   { color: var(--green); background: rgba(0,185,107,0.12); }
    .goal-dot.below { color: #E8A317; background: rgba(232,163,23,0.12); }
    .goal-dot.above { color: #EF4444; background: rgba(239,68,68,0.12); }
    .goal-dot.none  { color: var(--text-muted); background: transparent; opacity: 0.4; }

    /* Expandable macro tracker in cart */
    .goal-tracker {
      display: none; padding: 8px 14px 10px;
      background: var(--cream-light); border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border); margin: 0 -14px;
      animation: slideDown 0.2s ease;
    }
    .goal-tracker.open { display: block; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

    .goal-tracker-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .goal-bar-row {
      display: flex; align-items: center; gap: 6px;
    }
    .goal-bar-ico { width: 16px; height: 16px; flex-shrink: 0; }
    .goal-bar-ico svg { width: 100%; height: 100%; }
    .goal-bar-wrap {
      flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative;
    }
    .goal-bar-fill {
      height: 100%; border-radius: 3px; transition: width 0.3s ease;
    }
    .goal-bar-fill.ok    { background: var(--green); }
    .goal-bar-fill.below { background: #E8A317; }
    .goal-bar-fill.above { background: #EF4444; }
    .goal-bar-fill.none  { background: var(--text-muted); opacity: 0.3; }
    .goal-bar-val {
      font-size: 10px; font-weight: 800; min-width: 52px; text-align: right; white-space: nowrap; color: var(--text-mid);
    }
    .goal-bar-val .goal-range { font-weight: 600; color: var(--text-muted); font-size: 9px; }

    .goal-toggle-btn {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      padding: 2px 0; margin-top: 2px; font-family: inherit;
    }
    .goal-toggle-btn:hover { color: var(--green); }
    .goal-toggle-btn svg { width: 10px; height: 10px; transition: transform 0.2s; }
    .goal-toggle-btn.open svg { transform: rotate(180deg); }

    /* Goals tab in account */
    .goals-form { display: flex; flex-direction: column; gap: 18px; }
    .goal-enable-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; border-radius: var(--radius);
      background: var(--green-pale); border: 1.5px solid var(--green-light);
    }
    .goal-toggle {
      position: relative; width: 42px; height: 24px; flex-shrink: 0;
    }
    .goal-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .goal-toggle-track {
      position: absolute; inset: 0; background: var(--cream-dark); border-radius: 12px;
      cursor: pointer; transition: background 0.2s;
    }
    .goal-toggle-track::after {
      content: ''; position: absolute; width: 18px; height: 18px;
      left: 3px; top: 3px; background: white; border-radius: 50%;
      transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    .goal-toggle input:checked + .goal-toggle-track { background: var(--green); }
    .goal-toggle input:checked + .goal-toggle-track::after { transform: translateX(18px); }
    .goal-enable-label { font-size: 14px; font-weight: 800; color: var(--green-dark); }
    .goal-enable-sub { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-top: 1px; }

    .goal-macro-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px;
    }
    .goal-macro-card {
      background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    }
    .goal-macro-card .gmc-hdr {
      display: flex; align-items: center; gap: 8px;
    }
    .goal-macro-card .gmc-ico { width: 22px; height: 22px; }
    .goal-macro-card .gmc-ico svg { width: 100%; height: 100%; }
    .goal-macro-card .gmc-ico.cal  { color: #FF6B35; }
    .goal-macro-card .gmc-ico.prot { color: #00B96B; }
    .goal-macro-card .gmc-ico.carb { color: #3B82F6; }
    .goal-macro-card .gmc-ico.fat  { color: #E8A317; }
    .goal-macro-card .gmc-name { font-size: 14px; font-weight: 900; color: var(--green-dark); }
    .goal-macro-card .gmc-unit { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-left: auto; }
    .goal-inputs-row { display: flex; gap: 10px; }
    .goal-input-wrap {
      flex: 1; display: flex; flex-direction: column; gap: 3px;
    }
    .goal-input-lbl { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .goal-input {
      width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 15px; font-weight: 700; color: var(--green-dark);
      outline: none; transition: border-color 0.15s; text-align: center;
    }
    .goal-input:focus { border-color: var(--green); }

    /* Intake history in goals tab */
    .intake-history { margin-top: 24px; }
    .intake-order-card {
      border: 1.5px solid var(--border); border-radius: var(--radius); overflow: hidden;
      margin-bottom: 12px; background: var(--white);
    }
    .intake-order-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--cream-light);
      font-size: 13px; font-weight: 800; color: var(--green-dark);
    }
    .intake-day-row {
      display: grid; grid-template-columns: 120px 1fr; gap: 12px;
      padding: 10px 16px; border-top: 1px solid var(--border);
      align-items: center;
    }
    .intake-day-name { font-size: 12px; font-weight: 800; color: var(--text-mid); }
    .intake-bars { display: flex; gap: 8px; flex: 1; align-items: center; }
    .intake-mini-bar {
      display: flex; align-items: center; gap: 4px; flex: 1;
    }
    .intake-mini-bar svg { width: 12px; height: 12px; flex-shrink: 0; }
    .intake-mini-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .intake-mini-fill { height: 100%; border-radius: 3px; }
    .intake-mini-fill.ok    { background: var(--green); }
    .intake-mini-fill.below { background: #E8A317; }
    .intake-mini-fill.above { background: #EF4444; }
    .intake-mini-val { font-size: 9px; font-weight: 700; color: var(--text-muted); min-width: 26px; }

    /* Modal goal context */
    .dm-goal-context {
      margin-top: 8px; padding: 8px 12px; border-radius: var(--radius-sm);
