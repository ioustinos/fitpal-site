[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"

# NOTE: /api/* rewrite lives in public/_redirects (not here) because
# Netlify evaluates _redirects BEFORE netlify.toml at runtime, and the
# /* SPA fallback in _redirects was swallowing /api/* requests otherwise.
